<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ズーラシア園内マップ</title>
  <meta name="description" content="よこはま動物園ズーラシアのインタラクティブ園内マップ。動物や飲食店の情報をタップで確認。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a2f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Top Bar -->
  <header class="topbar" id="topbar">
    <button class="topbar-btn" id="btn-gps" aria-label="現在位置を表示">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
      </svg>
    </button>
    <h1 class="topbar-title">🦁 ズーラシア マップ</h1>
    <button class="topbar-btn" id="btn-reset" aria-label="地図をリセット">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10" />
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
      </svg>
    </button>
  </header>

  <!-- Map Container -->
  <main class="map-wrap" id="map-wrap">
    <div class="map-viewport" id="map-viewport">
      <!-- Map image -->
      <img src="map.png" class="map-image" id="map-image" alt="ズーラシア園内マップ" draggable="false" />
      <!-- Hotspot container (same size as image) -->
      <div class="hotspots" id="hotspots">
        <!-- Hotspots generated by JS -->
      </div>
      <!-- GPS marker -->
      <div class="gps-marker" id="gps-marker" style="display:none;">
        <div class="gps-dot"></div>
        <div class="gps-ring"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle" id="sheet-handle"><span></span></div>
    <div class="sheet-body" id="sheet-body">
      <!-- Content filled by JS -->
    </div>
  </div>

  <!-- Scrim overlay -->
  <div class="scrim" id="scrim"></div>

  <!-- Toast for GPS status -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>

</html>
